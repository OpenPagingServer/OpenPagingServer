html,body{margin:0;padding:0;background:transparent;font-family:Tahoma,sans-serif;color:#202124}
body{padding:0}
.card{position:relative;background:#fff;border-radius:18px;padding:28px 28px 24px 28px;box-shadow:0 18px 48px rgba(0,0,0,.28)}
.logo{position:absolute;top:18px;left:40px;width:96px;height:72px;background-image:var(--logo-light-base64);background-size:contain;background-repeat:no-repeat;background-position:left top}
.content{padding-top:82px}
.icon{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#E3F2FD;color:#1976D2;font-size:1.2em;margin-bottom:16px}
h1{margin:0 0 12px 0;font-size:1.4em;font-weight:500}
p{margin:0 0 12px 0;line-height:1.5}
a{color:#1976D2;text-decoration:none}
a:hover{text-decoration:underline}
@media(prefers-color-scheme:dark){
  .card{background:#1E1E1E;color:#E0E0E0}
  .logo{background-image:var(--logo-dark-base64)}
  .icon{background:#2A2433;color:#BB86FC}
  a{color:#BB86FC}
}
</style>
</head>
<body>
  <div class="card">
    <div class="logo"></div>
    <div class="content">
      <h1>Ready to get started with Open Paging Server?</h1>
      <p>Setup and host a powerful free & open-source paging and mass notification system that adapts to your application.</p>
      <p>Learn more at <a href="https://www.openpagingserver.org">openpagingserver.org</a></p>
    </div>
  </div>
</body>
</html>
