<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:transparent;font-family:Tahoma,sans-serif;color:#202124}
body{padding:0}
.card{background:#fff;border-radius:18px;padding:28px 28px 24px 28px;box-shadow:0 18px 48px rgba(0,0,0,.28)}
.icon{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#E3F2FD;color:#1976D2;font-size:1.2em;margin-bottom:16px}
h1{margin:0 0 12px 0;font-size:1.4em;font-weight:500}
p{margin:0 0 12px 0;line-height:1.5}
a{color:#1976D2;text-decoration:none}
a:hover{text-decoration:underline}
@media(prefers-color-scheme:dark){
  .card{background:#1E1E1E;color:#E0E0E0}
  .icon{background:#2A2433;color:#BB86FC}
  a{color:#BB86FC}
}
</style>
</head>
<body>
  <div class="card">
    <h1>Get started with Open Paging Server today!</h1>
  </div>
</body>
</html>
